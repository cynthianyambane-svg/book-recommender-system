<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Catalog — Search & Filter Module</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="script" href="{{ url_for('static', filename='script.js') }}">
<link rel="python" href="Search.py">




</head>
<body>

<div class="scene">

  <header class="masthead">
    <div class="masthead-eyebrow">SEARCH &amp; FILTER MODULE</div>
    <h1 class="masthead-title">The Card Catalog</h1>
   
  </header>

  <main class="layout">

    <!-- LEFT: search controls -->
    <section class="panel controls-panel">
      <div class="panel-label">01 — Query</div>

      <div class="tabs" id="searchTabs">
        <button class="tab active" data-type="title">Title</button>
        <button class="tab" data-type="title_prefix">Starts with</button>
        <button class="tab" data-type="genre">Genre</button>
        <button class="tab" data-type="author">Author</button>
        <button class="tab" data-type="author_sort">Author (sorted)</button>
      </div>

      <form id="searchForm" class="search-form">
        <input type="text" id="searchInput" placeholder="e.g. Limerence" autocomplete="off">
        <button type="submit" class="btn-primary">Search</button>
      </form>

   

      <details class="add-book">
        <summary>+ Add a book to the catalogue</summary>
        <form id="addBookForm" class="add-book-form">
          <input type="text" id="addTitle" placeholder="Title" required>
          <input type="text" id="addAuthor" placeholder="Author" required>
          <input type="text" id="addGenre" placeholder="Genre" required>
          <button type="submit" class="btn-secondary">Insert</button>
        </form>
        <p class="add-book-note">Inserts into the catalogue.</p>
      </details>
    </section>

    <!-- RIGHT: results -->
    <section class="panel results-panel">
      <div class="panel-label" id="resultsLabel">02 — Results</div>
      <div class="results-grid" id="resultsGrid">
        <p class="empty-state">Run a search, or browse the full catalogue below.</p>
      </div>
    </section>

  </main>

  <!-- HISTORY: doubly linked list visualization -->
  <section class="panel history-panel">
    <div class="panel-label">03 — Search History <span class="ds-tag"></span></div>
    <div class="history-row">
      <button id="histBack" class="nav-arrow" disabled>&#8592;</button>
      <div class="chain" id="chain"><!-- nodes injected by JS --></div>
      <button id="histForward" class="nav-arrow" disabled>&#8594;</button>
    </div>
    <p class="history-hint"> browser history.</p>
  </section>

  <!-- FULL CATALOGUE -->
  <section class="panel catalogue-panel">
    <div class="panel-label">Full Catalogue <span class="ds-tag"></span></div>
    <div class="catalogue-list" id="catalogueList"></div>
  </section>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
